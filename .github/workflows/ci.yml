name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install the core scientific stack + test deps
        # The heavy optional layers (torch / pymc / numpyro / jax / rdkit / h5py)
        # are NOT installed here; the tests that need them skip gracefully via
        # pytest.importorskip. This CI validates the numpy-only core (the
        # class-prognostic result, fusion, calibration, the trial-watch, the
        # reporting + doc validators) and confirms graceful degradation.
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scipy scikit-learn matplotlib pyarrow \
                      pytest httpx respx ruff
          pip install -e . --no-deps

      - name: Lint (ruff, real-bug rules only)
        # E9 = syntax errors, F63/F7/F82 = the pyflakes "real bug" set
        # (undefined names, etc.). Style-only rules (unused imports/vars) are
        # intentionally not gated here.
        run: ruff check src scripts --select E9,F63,F7,F82

      - name: Run the non-slow test suite
        run: pytest -m "not slow" -p no:cacheprovider -q
